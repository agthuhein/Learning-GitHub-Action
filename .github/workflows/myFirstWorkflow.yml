name: my-First-Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ENV_TYPE: DEV
  APP_USER: aungthuhein
  APP_PORT: 80

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: |
          pwd
          ls -ltr
          hostname

      - name: Step-2 - Checkout
        uses: actions/checkout@v4

      - name: Step-3
        run: |
          pwd > myartifact.txt
          mkdir -p artifacts
          ls -ltr > artifacts/list.txt
          hostname > artifacts/hostname.txt

      - name: Upload single file
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: ./myartifact.txt

  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Checking current directory
        run: |
          pwd
          ls -ltr

      - name: Download single file artifact
        uses: actions/download-artifact@v4
        with:
          name: single_file

      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr

      - name: Step for PR demos
        run: exit 0

      - name: Referring Environment Variables
        run: |
          echo "[INFO] Running deployment for $ENV_TYPE with user $APP_USER"
          echo "[INFO] Once deployed application is accessible on port $APP_PORT"

      - name: Referring Repository Secret
        run: |
          echo "[INFO] Application password is ${{ secrets.APP_PASSWORD }}"

  job3:
    name: JOB3
    runs-on: ubuntu-latest
    steps:
      - name: Referring context or in-built variables
        run: |
          echo "[INFO] Triggered by ${{ github.event_name }}."
          echo "[INFO] New changes are added by ${{ github.actor }}."
          echo "[INFO] Current step is running on ${{ runner.os }}."
          echo "[INFO] Current JOB ID is ${{ job.check_run_id }}."

  staging:
    name: STAGE DEPLOYMENT
    runs-on: ubuntu-latest
    steps:
      - name: Referring Environment Variables
        run: |
          echo "[INFO] Running deployment on ${{ vars.HOST }} using ${{ vars.USER }}."
      - name: Referring Environment Secrets
        run: |
          echo "[INFO] Password for ${{ vars.USER }} is ${{ secrets.PASSWORD }}."
    environment:
      name: STAGING
    if: github.head_ref == 'dev'

  production:
    name: production DEPLOYMENT
    runs-on: ubuntu-latest
    steps:
      - name: Referring Environment Variables
        run: |
          echo "[INFO] Running deployment on ${{ vars.HOST }} using ${{ vars.USER }}."

      - name: Referring Environment Secrets
        run: |
          echo "[INFO] Password for ${{ vars.USER }} is ${{ secrets.PASSWORD }}."
    environment:
      name: PRODUCTION
    if: github.ref == 'refs/heads/main'
