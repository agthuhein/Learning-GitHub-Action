name: CI Pipeline Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  security-events: write
  packages: write
  contents: read

jobs:
  ci-pipeline-job:
    uses: agthuhein/reusable-workflows/.github/workflows/ci-pipeline.yml@main
    with:
      run_codeql: false
      run_sonarqube: false
      run_build: true
      run_ghcr_publish: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-with-kubectl:
    needs: ci-pipeline-job
    uses: agthuhein/reusable-workflows/.github/workflows/deploy-with-kubectl.yml@main
    with:
      ENVIRONMENT: STAGING
      IMAGE_NAME: ghcr.io/agthuhein/ath_app
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
